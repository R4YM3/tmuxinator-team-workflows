partials:
  landing-frontend:
    editor_cmd: "nvim"
  cc-backend-headless-cms:
    editor_cmd: "nvim"
  videoland-titles:
    editor_cmd: "nvim"

windows:
  - ai:
      panes:
        - 'opencode || zsh -l'

  - git:
      layout: even-horizontal
      panes:
        - frontend: 'cd ./landing-frontend && lazygit'
        - strapi: 'cd ./cc-backend-headless-cms && lazygit'
        - titles: 'cd ./videoland-titles && lazygit'

  - shell:
      panes:
        - 'zsh -l'
