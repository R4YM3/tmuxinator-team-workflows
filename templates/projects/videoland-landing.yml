
name: videoland-landing
root: <%= ENV.fetch("REPOSITORIES_ROOT") %>/landing-videoland

startup_window: frontend
startup_pane: 1

enable_pane_titles: true
pane_title_position: top
pane_title_format: "#{pane_index}: #{pane_title}"

<%
Kernel.load ENV.fetch("TEAM_WORKFLOWS_HELPER_FILE")
override_data = load_project_override("videoland-landing")
%>

pre_window: >-
  bash -lc '<%= include_pre_window("node-nvm-use") %>'

on_project_start: >-
  bash -lc '<%= include_on_project_start("node-bootstrap") %>; echo "Tracing is manual. Run npm run jaeger:start when needed."'

windows:
<%= include_window("landing-frontend", folder: "./landing-frontend", overrides: partial_override(override_data, "landing-frontend")) %>
<%= include_window("cc-backend-headless-cms", folder: "./cc-backend-headless-cms", overrides: partial_override(override_data, "cc-backend-headless-cms")) %>
<%= include_window("videoland-titles", folder: "./videoland-titles", overrides: partial_override(override_data, "videoland-titles")) %>

<%= render_extra_windows(override_data) %>
