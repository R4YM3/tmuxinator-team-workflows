name: flow-tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: flow-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_flow: ${{ steps.filter.outputs.flow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flow:
              - 'twf'
              - 'scripts/**'
              - 'examples/**'
              - 'tests/flows/**'
              - 'tests/helpers/**'
              - 'tests/scripts/test-flow'

  flow:
    name: flow-tests-${{ matrix.os }}
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.run_flow == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats tmux tmuxinator ruby git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core tmux tmuxinator

      - name: Run flow tests
        run: tests/scripts/test-flow
