name: wsl-smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: wsl-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_wsl: ${{ steps.filter.outputs.wsl }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            wsl:
              - 'twf'
              - 'scripts/**'
              - '.github/workflows/wsl-smoke.yml'

  wsl:
    name: wsl-smoke
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.run_wsl == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Resolve WSL distro
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Get-Distros {
            $raw = wsl.exe --list --quiet 2>$null
            if (-not $raw) { return @() }
            return $raw -replace "`0", "" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
          }

          $distros = Get-Distros
          if (-not $distros -or $distros.Count -eq 0) {
            wsl.exe --install --distribution Ubuntu --no-launch
            $distros = Get-Distros
          }

          if (-not $distros -or $distros.Count -eq 0) {
            throw "Unable to find or install a WSL distro on this runner."
          }

          if ($distros -contains "Ubuntu") {
            $DistroName = "Ubuntu"
          } else {
            $DistroName = $distros[0]
          }

          "TWF_WSL_DISTRO=$DistroName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: WSL smoke checks
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $DistroName = $env:TWF_WSL_DISTRO
          $workspace = $env:GITHUB_WORKSPACE

          if ($workspace -notmatch '^([A-Za-z]):\\(.*)$') {
            throw "Unexpected GITHUB_WORKSPACE format: $workspace"
          }

          $drive = $Matches[1].ToLower()
          $rest = $Matches[2] -replace '\\', '/'
          $workspaceWsl = "/mnt/$drive/$rest"

          wsl.exe -d $DistroName -- bash -lc "tr -d '\r' < '$workspaceWsl/twf' > '$workspaceWsl/twf.lf' && mv '$workspaceWsl/twf.lf' '$workspaceWsl/twf' && chmod +x '$workspaceWsl/twf'"
          wsl.exe -d $DistroName -- bash -lc "cd '$workspaceWsl' && bash ./twf help"
          wsl.exe -d $DistroName -- bash -lc "mkdir -p /tmp/twf-wsl-smoke && cd /tmp/twf-wsl-smoke && touch package.json && TEAM_WORKFLOWS_ROOT=/tmp/team-workflows bash '$workspaceWsl/twf' add wsl-smoke --dry-run"
