name: service-contract-tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: service-contract-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_services: ${{ steps.filter.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            services:
              - 'twf'
              - 'services/**'
              - 'tests/services/**'
              - 'tests/helpers/service_contract.bash'
              - 'tests/scripts/test-services'

  services:
    name: service-contract-tests-${{ matrix.os }}
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.run_services == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats python3

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Run service contract tests
        run: tests/scripts/test-services
